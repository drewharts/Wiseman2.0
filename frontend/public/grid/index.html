<!DOCTYPE html>
<html lang="en">
<head>
  <script>Object.defineProperty(globalThis, 'CESIUM_BASE_URL', { value: '/grid/cesium-package/' })</script>

  <script src="/grid/cesium-package/Cesium.js"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City Builder</title>
  <script type="module" crossorigin src="/grid/assets/index-BkX4M9f4.js"></script>
  <link rel="stylesheet" crossorigin href="/grid/assets/index-B90boByF.css">
</head>
<body>
  <div id="app">
    <div id="cesium-container"></div>
    <button id="sidebar-toggle" aria-label="Toggle sidebar"></button>
    <aside id="sidebar">
      <header class="sidebar-header">
        <h1>City<br/>Builder</h1>
        <span id="active-layer-count" class="active-layer-badge" style="display:none"></span>
        <button id="help-btn" class="help-btn" aria-label="Help">?</button>
      </header>
      <nav id="sidebar-tabs" class="sidebar-tabs">
        <button class="tab-btn active" data-tab="discover">Discover</button>
        <button class="tab-btn" data-tab="layers">Layers</button>
        <button class="tab-btn" data-tab="stats">Stats</button>
        <button class="tab-btn" data-tab="details">Details</button>
        <button class="tab-btn" data-tab="assessment">Assess</button>
        <button class="tab-btn" data-tab="plan">Plan</button>
      </nav>
      <div id="sidebar-content" class="sidebar-content">
        <div id="tab-discover" class="tab-panel active">
          <div id="top-sites-panel" class="panel"></div>
        </div>
        <div id="tab-layers" class="tab-panel" style="display:none">
          <div id="layer-control-panel" class="panel"></div>
        </div>
        <div id="tab-stats" class="tab-panel" style="display:none">
          <div id="live-metrics-panel" class="panel"></div>
          <div id="breakdown-panel" class="panel"></div>
        </div>
        <div id="tab-details" class="tab-panel" style="display:none">
          <div id="entity-info-panel" class="panel"></div>
        </div>
        <div id="tab-assessment" class="tab-panel" style="display:none">
          <div id="site-assessment-panel" class="panel"></div>
        </div>
        <div id="tab-plan" class="tab-panel" style="display:none">
          <div id="city-planner-panel" class="panel"></div>
        </div>
      </div>
    </aside>
  </div>
</body>
</html>
